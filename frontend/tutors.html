<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutores - AmigoPet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <span class="text-3xl">🐾</span>
        <div>
          <h1 class="text-xl md:text-2xl font-bold text-purple-600">AmigoPet</h1>
          <p class="text-xs text-gray-500 hidden sm:block">Gestão de tutores</p>
        </div>
      </div>
      <button
        id="logoutBtn"
        class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 md:px-6 rounded-lg text-sm md:text-base transition-all transform hover:scale-105 active:scale-95"
      >
        🚪 Sair
      </button>
    </div>
  </nav>

  <!-- Menu -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 overflow-x-auto">
      <div class="flex gap-4 md:gap-6">
        <a href="index.html" class="py-3 text-gray-600 hover:text-purple-600 font-semibold whitespace-nowrap">📊 Dashboard</a>
        <a href="tutors.html" class="py-3 border-b-2 border-purple-600 text-purple-600 font-semibold whitespace-nowrap">👨‍👩‍👧 Tutores</a>
        <a href="pets.html" class="py-3 text-gray-600 hover:text-purple-600 font-semibold whitespace-nowrap">🐶 Pets</a>
        <a href="services.html" class="py-3 text-gray-600 hover:text-purple-600 font-semibold whitespace-nowrap">🏥 Serviços</a>
        <a href="products.html" class="py-3 text-gray-600 hover:text-purple-600 font-semibold whitespace-nowrap">🛍️ Produtos</a>
        <a href="appointments.html" class="py-3 text-gray-600 hover:text-purple-600 font-semibold whitespace-nowrap">📅 Agendamentos</a>
      </div>
    </div>
  </nav>

  <!-- Conteúdo -->
  <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- Header da página -->
    <section class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div>
        <h2 class="text-2xl font-bold text-gray-800">Tutores</h2>
        <p class="text-sm text-gray-600">Cadastre e gerencie os responsáveis pelos pets.</p>
      </div>
      <button
        id="addTutorBtn"
        class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-4 rounded-lg text-sm md:text-base transition-all transform hover:scale-105 active:scale-95"
      >
        ➕ Novo Tutor
      </button>
    </section>

    <!-- Formulário (toggle) -->
    <section id="tutorFormSection" class="bg-white rounded-xl shadow-md p-4 md:p-6 hidden">
      <div class="flex items-center justify-between mb-4">
        <h3 id="tutorFormTitle" class="text-lg font-bold text-gray-800">Adicionar Tutor</h3>
        <button id="closeFormBtn" class="text-gray-500 hover:text-red-500 text-xl leading-none">✖</button>
      </div>

      <form id="tutorForm" class="grid gap-4 md:grid-cols-2">
        <!-- Nome -->
        <div class="md:col-span-1">
          <label class="block text-sm font-semibold text-gray-700 mb-1" for="tutorNome">Nome completo</label>
          <input
            id="tutorNome"
            type="text"
            required
            placeholder="Ex: Maria Silva"
            class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200"
          />
        </div>

        <!-- Contato (email ou outro) -->
        <div class="md:col-span-1">
          <label class="block text-sm font-semibold text-gray-700 mb-1" for="tutorContato">Contato (e-mail ou outro)</label>
          <input
            id="tutorContato"
            type="text"
            required
            placeholder="Ex: maria@exemplo.com"
            class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200"
          />
        </div>

        <!-- Endereço -->
        <div class="md:col-span-2">
          <label class="block text-sm font-semibold text-gray-700 mb-1" for="tutorEndereco">Endereço</label>
          <input
            id="tutorEndereco"
            type="text"
            required
            placeholder="Rua, número, bairro, cidade"
            class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200"
          />
        </div>

        <!-- Telefone -->
        <div class="md:col-span-1">
          <label class="block text-sm font-semibold text-gray-700 mb-1" for="tutorTelefone">Telefone</label>
          <input
            id="tutorTelefone"
            type="tel"
            required
            placeholder="(11) 99999-9999"
            class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200"
          />
        </div>

        <!-- Ações -->
        <div class="md:col-span-2 flex justify-end gap-3 mt-2">
          <button
            type="button"
            id="cancelTutorBtn"
            class="border border-gray-300 text-gray-700 hover:bg-gray-100 font-semibold py-2 px-4 rounded-lg text-sm transition"
          >
            Cancelar
          </button>
          <button
            type="submit"
            class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-4 rounded-lg text-sm transition"
          >
            Salvar
          </button>
        </div>
      </form>
    </section>

    <!-- Tabela -->
    <section class="bg-white rounded-xl shadow-md p-4 md:p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold text-gray-800">Lista de Tutores</h3>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-2 text-left font-semibold text-gray-700">Nome</th>
              <th class="px-4 py-2 text-left font-semibold text-gray-700">Contato</th>
              <th class="px-4 py-2 text-left font-semibold text-gray-700">Endereço</th>
              <th class="px-4 py-2 text-left font-semibold text-gray-700">Telefone</th>
              <th class="px-4 py-2 text-right font-semibold text-gray-700">Ações</th>
            </tr>
          </thead>
          <tbody id="tutorsTableBody" class="divide-y divide-gray-100">
            <!-- preenchido via JS -->
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="./js/api.js"></script>
  <script src="./js/tutors.js"></script>
</body>
</html>
