<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AmigoPet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body class="bg-gradient-to-br from-purple-600 via-pink-500 to-pink-600 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <!-- Header -->
      <div class="bg-gradient-to-r from-purple-600 to-pink-500 p-8 text-center">
        <div class="flex justify-center mb-4">
          <img src="./images/login-img.jpeg" alt="AmigoPet Logo"
               class="w-20 h-20 rounded-full border-4 border-white shadow-lg object-cover" />
        </div>
        <h1 class="text-3xl font-bold text-white mb-1">🐾 AmigoPet</h1>
        <p class="text-purple-100 text-sm">Bem-vindo de volta!</p>
      </div>

      <!-- Form -->
      <div class="p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Acesse sua conta</h2>

        <form id="loginForm" class="space-y-5">
          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">E-mail</label>
            <div class="relative">
              <span class="absolute left-3 top-2.5 text-purple-600">📧</span>
              <input
                id="email"
                type="email"
                required
                placeholder="seu@email.com"
                class="w-full pl-9 pr-3 py-2.5 border-2 border-gray-200 rounded-lg text-sm
                       focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200" />
            </div>
          </div>

          <!-- Senha -->
          <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
            <div class="relative">
              <span class="absolute left-3 top-2.5 text-purple-600">🔒</span>
              <input
                id="password"
                type="password"
                required
                placeholder="••••••••"
                class="w-full pl-9 pr-9 py-2.5 border-2 border-gray-200 rounded-lg text-sm
                       focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200" />
              <button type="button"
                      class="absolute right-3 top-2.5 text-gray-500 hover:text-purple-600 text-sm"
                      onclick="togglePassword()">
                👁️
              </button>
            </div>
          </div>

          <!-- Mensagem -->
          <div id="loginMessage" class="text-center text-sm min-h-[1.25rem]"></div>

          <!-- Botão Entrar -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-700 hover:to-pink-600
                   text-white font-semibold py-2.5 rounded-lg text-sm transition-all
                   transform hover:scale-[1.02] active:scale-95 shadow-md">
            ✨ Entrar
          </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="px-2 bg-white text-gray-500">ou</span>
          </div>
        </div>

        <!-- Google (placeholder) -->
        <button
          type="button"
          class="w-full flex items-center justify-center gap-2 bg-white border-2 border-gray-300
                 hover:border-purple-600 hover:bg-purple-50 text-gray-700 font-semibold py-2.5
                 rounded-lg text-sm transition"
          onclick="loginWithGoogle()">
          <span>🔐</span>
          <span>Entrar com Google</span>
        </button>

        <!-- Links -->
        <div class="mt-5 space-y-2 text-center text-xs text-gray-600">
          <a href="#" class="block text-purple-600 hover:text-purple-700 font-semibold hover:underline">
            Esqueceu sua senha?
          </a>
          <p>
            Não possui conta?
            <a href="register.html" class="text-purple-600 hover:text-purple-700 font-bold hover:underline">
              Cadastre-se
            </a>
          </p>
        </div>
      </div>
    </div>

    <p class="text-center text-white text-xs mt-4 opacity-80">
      © 2024 AmigoPet. Todos os direitos reservados.
    </p>
  </div>

  <script src="./js/api.js"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const msgEl = document.getElementById('loginMessage');

      msgEl.textContent = '';
      msgEl.className = 'text-center text-sm min-h-[1.25rem]';

      try {
        const data = await login(email, password); // api.js

        if (data.token) {
          localStorage.setItem('token', data.token);
          if (data.user) localStorage.setItem('user', JSON.stringify(data.user));

          msgEl.textContent = '✅ Login realizado com sucesso!';
          msgEl.className = 'text-center text-sm min-h-[1.25rem] text-green-600 font-semibold';

          setTimeout(() => (window.location.href = 'index.html'), 1200);
        } else {
          msgEl.textContent = '❌ ' + (data.message || 'Credenciais inválidas');
          msgEl.className = 'text-center text-sm min-h-[1.25rem] text-red-600 font-semibold';
        }
      } catch {
        msgEl.textContent = '❌ Erro de conexão com o servidor';
        msgEl.className = 'text-center text-sm min-h-[1.25rem] text-red-600 font-semibold';
      }
    });

    function loginWithGoogle() {
      alert('Login com Google ainda não implementado (placeholder).');
    }

    // Se já estiver logado, vai direto pro dashboard
    const token = localStorage.getItem('token');
    if (token) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
