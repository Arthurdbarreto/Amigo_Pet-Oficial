<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - AmigoPet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-600 via-pink-500 to-pink-600 min-h-screen flex items-center justify-center p-4">
  
  <div class="w-full max-w-md">
    <!-- Card Principal -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      
      <!-- Header com Gradiente -->
      <div class="bg-gradient-to-r from-purple-600 to-pink-500 p-8 text-center">
        <div class="flex justify-center mb-4">
          <img src="./images/login-img.jpeg" alt="AmigoPet Logo" class="w-20 h-20 rounded-full border-4 border-white shadow-lg object-cover">
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">🐾 AmigoPet</h1>
        <p class="text-purple-100">Junte-se à nossa comunidade</p>
      </div>

      <!-- Formulário -->
      <div class="p-8">
        
        <!-- Subtítulo -->
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Criar Conta</h2>

        <!-- Form -->
        <form id="registerForm" class="space-y-4">
          
          <!-- Nome -->
          <div>
            <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">Nome Completo</label>
            <div class="relative">
              <span class="absolute left-4 top-3.5 text-purple-600">👤</span>
              <input 
                type="text" 
                id="name" 
                placeholder="Seu nome completo"
                required
                class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200 transition-all"
              >
            </div>
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">E-mail</label>
            <div class="relative">
              <span class="absolute left-4 top-3.5 text-purple-600">📧</span>
              <input 
                type="email" 
                id="email" 
                placeholder="seu@email.com"
                required
                class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200 transition-all"
              >
            </div>
          </div>

          <!-- Senha -->
          <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Senha</label>
            <div class="relative">
              <span class="absolute left-4 top-3.5 text-purple-600">🔒</span>
              <input 
                type="password" 
                id="password" 
                placeholder="••••••••"
                required
                minlength="6"
                class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200 transition-all"
              >
            </div>
            <p class="text-xs text-gray-500 mt-1">Mínimo 6 caracteres</p>
          </div>

          <!-- Confirmar Senha -->
          <div>
            <label for="passwordConfirm" class="block text-sm font-semibold text-gray-700 mb-2">Confirmar Senha</label>
            <div class="relative">
              <span class="absolute left-4 top-3.5 text-purple-600">🔒</span>
              <input 
                type="password" 
                id="passwordConfirm" 
                placeholder="••••••••"
                required
                class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200 transition-all"
              >
            </div>
          </div>

          <!-- Termo de Uso -->
          <label class="flex items-center gap-3 text-sm text-gray-600">
            <input type="checkbox" required class="w-4 h-4 rounded border-2 border-gray-300
            <input type="checkbox" required class="w-4 h-4 rounded border-2 border-gray-300 accent-purple-600">
            <span>Concordo com os <a href="#" class="text-purple-600 hover:underline">Termos de Uso</a></span>
          </label>

          <!-- Mensagem de Erro/Sucesso -->
          <div id="registerMessage" class="text-center text-sm min-h-6"></div>

          <!-- Botão Cadastrar -->
          <button 
            type="submit"
            class="w-full bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-700 hover:to-pink-600 text-white font-bold py-3 rounded-lg transition-all transform hover:scale-105 active:scale-95 shadow-lg"
          >
            ✨ Cadastrar
          </button>
        </form>

        <!-- Link Login -->
        <div class="mt-6 text-center text-sm text-gray-600">
          Já possui conta?
          <a href="login.html" class="text-purple-600 hover:text-purple-700 font-bold hover:underline">
            Faça login aqui
          </a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-white text-sm mt-6 opacity-80">
      © 2024 AmigoPet. Todos os direitos reservados.
    </p>
  </div>

  <script src="./js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;
      const msgEl = document.getElementById('registerMessage');

      msgEl.innerHTML = '';
      msgEl.className = 'text-center text-sm min-h-6';

      // Validação de senhas
      if (password !== passwordConfirm) {
        msgEl.innerHTML = '❌ As senhas não conferem';
        msgEl.className = 'text-center text-sm min-h-6 text-red-600 font-bold';
        return;
      }

      if (password.length < 6) {
        msgEl.innerHTML = '❌ Senha deve ter no mínimo 6 caracteres';
        msgEl.className = 'text-center text-sm min-h-6 text-red-600 font-bold';
        return;
      }

      try {
        const data = await register(name, email, password);
        
        if (data.id) {
          msgEl.innerHTML = '✅ Cadastro realizado com sucesso!';
          msgEl.className = 'text-center text-sm min-h-6 text-green-600 font-bold';
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          msgEl.innerHTML = '❌ ' + (data.message || 'Erro ao cadastrar');
          msgEl.className = 'text-center text-sm min-h-6 text-red-600 font-bold';
        }
      } catch (err) {
        msgEl.innerHTML = '❌ Erro de conexão com servidor';
        msgEl.className = 'text-center text-sm min-h-6 text-red-600 font-bold';
      }
    });

    // Redirecionar se já estiver logado
    const token = localStorage.getItem('token');
    if (token) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
