<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - AmigoPet</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="main-header">
    <div class="header-top">
      <h1>🐾 AmigoPet</h1>
@'
      <h1>🐾 AmigoPet</h1>
      <button id="logoutBtn" class="logout-btn">Sair</button>
    </div>
  </header>
  <nav class="main-nav">
    <a href="index.html">Dashboard</a>
    <a href="tutors.html">Tutores</a>
    <a href="pets.html">Pets</a>
    <a href="services.html">Serviços</a>
    <a href="products.html" class="active">Produtos</a>
    <a href="appointments.html">Agendamentos</a>
  </nav>
  <main class="page-content">
    <section class="page-header">
      <h2>📦 Gerenciar Produtos</h2>
      <button id="addProductBtn" class="btn-primary">+ Novo Produto</button>
    </section>
    
    <section id="productForm" class="form-section" style="display:none;">
      <h3 id="formTitle">Adicionar Produto</h3>
      <form id="productFormEl">
        <div class="form-row">
          <input type="text" id="productName" placeholder="Nome do produto" required>
          <select id="productCategory" required>
            <option value="">Selecione a categoria</option>
            <option value="Ração">Ração</option>
            <option value="Brinquedo">Brinquedo</option>
            <option value="Higiene">Higiene</option>
            <option value="Acessório">Acessório</option>
            <option value="Medicamento">Medicamento</option>
            <option value="Suplemento">Suplemento</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div class="form-row">
          <input type="number" step="0.01" id="productPrice" placeholder="Preço" required>
          <input type="number" id="productStock" placeholder="Estoque" required>
        </div>
        <div class="form-row">
          <input type="text" id="productBrand" placeholder="Marca">
          <input type="text" id="productBarcode" placeholder="Código de barras">
        </div>
        <textarea id="productDescription" placeholder="Descrição do produto" rows="3"></textarea>
        <div class="form-row">
          <label>
            <input type="checkbox" id="productActive"> Produto ativo
          </label>
        </div>
        <div class="form-buttons">
          <button type="submit" class="btn-primary">Salvar</button>
          <button type="button" id="cancelBtn" class="btn-secondary">Cancelar</button>
        </div>
      </form>
    </section>

    <section class="data-table">
      <table id="productsTable">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Marca</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="productsBody">
        </tbody>
      </table>
    </section>
  </main>
  
  <script src="./js/api.js"></script>
  <script src="./js/products.js"></script>
</body>
</html>
