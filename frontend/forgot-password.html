<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Recuperar senha - AmigoPet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-600 via-pink-500 to-pink-600 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-purple-600 to-pink-500 p-6 text-center">
        <h1 class="text-2xl font-bold text-white mb-1">🐾 AmigoPet</h1>
        <p class="text-purple-100 text-sm">Recuperar senha</p>
      </div>
      <div class="p-6">
        <p class="text-sm text-gray-600 mb-4">
          Informe seu e-mail de cadastro. Se ele existir, enviaremos instruções de recuperação.
        </p>
        <form id="forgotForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1" for="email">E-mail</label>
            <input id="email" type="email" required
                   class="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:border-purple-600 focus:ring-2 focus:ring-purple-200"
                   placeholder="seu@email.com" />
          </div>
          <div id="forgotMessage" class="text-center text-sm min-h-[1.25rem]"></div>
          <button type="submit"
                  class="w-full bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-700 hover:to-pink-600
                         text-white font-semibold py-2.5 rounded-lg text-sm transition-all">
            Enviar instruções
          </button>
        </form>

        <div class="mt-4 text-center text-xs text-gray-600">
          Lembrou a senha?
          <a href="login.html" class="text-purple-600 hover:text-purple-700 font-bold hover:underline">
            Voltar ao login
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/api.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const msgEl = document.getElementById('forgotMessage');

      msgEl.textContent = '';
      msgEl.className = 'text-center text-sm min-h-[1.25rem]';

      try {
        const res = await fetch(API_BASE_URL + '/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
          msgEl.textContent = 'Se o e-mail existir, você receberá instruções em instantes.';
          msgEl.className = 'text-center text-sm min-h-[1.25rem] text-green-600 font-semibold';
        } else {
          msgEl.textContent = data.message || 'Erro ao solicitar recuperação.';
          msgEl.className = 'text-center text-sm min-h-[1.25rem] text-red-600 font-semibold';
        }
      } catch {
        msgEl.textContent = 'Erro de conexão com servidor.';
        msgEl.className = 'text-center text-sm min-h-[1.25rem] text-red-600 font-semibold';
      }
    });
  </script>
</body>
</html>
